---
version: '3.8'

## Github Version
##
## Awesome QR Code Docker – Default (SQLite)
##
## Usage:
##   docker compose up -d
##
## After changing .env, recreate containers to pick up new values:
##   docker compose up -d --force-recreate
##
## For PostgreSQL or MariaDB, see:
##   docker-compose.postgres.yml
##   docker-compose.mariadb.yml
##

services:
  app:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-awesome-qr-code-docker}:latest
    container_name: awesome-qr
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "${PORT:-3000}"
    env_file:
      - stack.env
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.qr.rule=Host(`qr.aicher.int`,`qr.npm.hosting-in-halfing.de`)"
      - "traefik.http.routers.qr.entrypoints=web"
      - "traefik.http.services.qr.loadbalancer.server.port=3000"
    environment:
      - NODE_ENV=production
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


networks:
  proxy:
    external: true
    
volumes:
  app-data:
